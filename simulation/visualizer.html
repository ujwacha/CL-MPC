<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pendulum Viz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #0a0c0f;
    --panel: #0f1318;
    --grid:  #ffffff08;
    --rail:  #1e2530;
    --cart:  #1a2a3a;
    --rod:   #4af0c8;
    --bob:   #ff4060;
    --acc:   #f0a020;
    --text:  #8ab4c8;
    --hi:    #e8f4ff;
    --green: #40e8a0;
    --red:   #ff4060;
    --dim:   #2a3a4a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: grid;
    grid-template-rows: 44px 1fr 180px;
    grid-template-columns: 1fr 260px;
    grid-template-areas:
      "header header"
      "canvas sidebar"
      "charts charts";
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    grid-area: header;
    background: var(--panel);
    border-bottom: 1px solid var(--dim);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
  }
  header h1 { font-family: 'Barlow', sans-serif; font-weight:600; font-size:15px; color:var(--hi); letter-spacing:.12em; text-transform:uppercase; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--red); transition: background .3s; }
  .dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .conn-label { font-size:11px; }
  .spacer { flex:1; }
  .stat-pill { background: var(--rail); border:1px solid var(--dim); border-radius:3px; padding:3px 10px; font-size:11px; }
  .stat-pill span { color: var(--hi); }

  /* ── Canvas ── */
  #viz-wrap {
    grid-area: canvas;
    position: relative;
    overflow: hidden;
  }
  canvas#sim { width:100%; height:100%; display:block; }

  /* ── Sidebar ── */
  aside {
    grid-area: sidebar;
    background: var(--panel);
    border-left: 1px solid var(--dim);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 12px;
  }
  .card-title { font-size:10px; letter-spacing:.12em; color:var(--text); margin-bottom:10px; text-transform:uppercase; }
  .state-row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid var(--grid); }
  .state-row:last-child { border:none; }
  .state-key { font-size:11px; color:var(--text); }
  .state-val { font-size:13px; color:var(--hi); min-width:80px; text-align:right; }
  .bar-wrap { height:3px; background:var(--rail); border-radius:2px; margin-top:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; transition: width .05s, background .3s; }

  .ctrl-row { display:flex; flex-direction:column; gap:6px; }
  input[type=range] {
    width: 100%; accent-color: var(--acc);
    height: 4px; cursor: pointer;
  }
  .ctrl-value { font-size:20px; color:var(--acc); text-align:center; font-family:'Barlow',sans-serif; font-weight:300; }
  .btn-row { display:flex; gap:6px; }
  button {
    flex:1; background:var(--rail); border:1px solid var(--dim); color:var(--hi);
    font-family:'Share Tech Mono',monospace; font-size:11px; padding:6px 4px;
    border-radius:3px; cursor:pointer; text-transform:uppercase; letter-spacing:.08em;
    transition: background .15s, border-color .15s;
  }
  button:hover { background:var(--dim); border-color:var(--rod); }
  button.danger { border-color: var(--red); }
  button.danger:hover { background: #2a0810; }

  .phase-label { font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--text); margin-bottom:4px; }

  /* ── Charts strip ── */
  #charts {
    grid-area: charts;
    background: var(--panel);
    border-top: 1px solid var(--dim);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--dim);
  }
  .chart-cell {
    background: var(--panel);
    padding: 6px 10px 4px;
    position: relative;
  }
  .chart-label { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--text); margin-bottom:2px; }
  canvas.mini { width:100%; height:110px; display:block; }
</style>
</head>
<body>

<header>
  <div class="dot" id="dot"></div>
  <h1>Inverted Pendulum</h1>
  <span class="conn-label" id="conn-label">ws://localhost:8765</span>
  <div class="spacer"></div>
  <div class="stat-pill">θ &nbsp;<span id="h-theta">0.000</span> rad</div>
  <div class="stat-pill">x &nbsp;<span id="h-x">0.000</span> m</div>
  <div class="stat-pill">t &nbsp;<span id="h-t">0.00</span> s</div>
</header>

<div id="viz-wrap">
  <canvas id="sim"></canvas>
</div>

<aside>
  <div class="card">
    <div class="card-title">State</div>
    <div class="state-row">
      <span class="state-key">θ angle</span>
      <span class="state-val" id="s-theta">0.0000</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="b-theta" style="width:50%;background:var(--rod)"></div></div>
    <div class="state-row" style="margin-top:6px">
      <span class="state-key">ω ang vel</span>
      <span class="state-val" id="s-omega">0.0000</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="b-omega" style="width:50%;background:var(--rod)"></div></div>
    <div class="state-row" style="margin-top:6px">
      <span class="state-key">x position</span>
      <span class="state-val" id="s-x">0.0000</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="b-x" style="width:50%;background:var(--acc)"></div></div>
    <div class="state-row" style="margin-top:6px">
      <span class="state-key">v velocity</span>
      <span class="state-val" id="s-v">0.0000</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="b-v" style="width:50%;background:var(--acc)"></div></div>
  </div>

  <div class="card">
    <div class="card-title">Control  a</div>
    <div class="ctrl-row">
      <div class="ctrl-value" id="ctrl-display">0.00</div>
      <input type="range" id="ctrl-slider" min="-20" max="20" step="0.1" value="0">
      <div class="btn-row">
        <button onclick="setCtrl(-5)">−5</button>
        <button onclick="setCtrl(0)">ZERO</button>
        <button onclick="setCtrl(5)">+5</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Actions</div>
    <div class="btn-row">
      <button onclick="sendReset()">Reset</button>
      <button class="danger" onclick="sendReset(true)">Reset Fall</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Phase θ–ω</div>
    <canvas id="phase" width="200" height="120"></canvas>
  </div>
</aside>

<div id="charts">
  <div class="chart-cell"><div class="chart-label">θ  angle (rad)</div><canvas class="mini" id="c-theta"></canvas></div>
  <div class="chart-cell"><div class="chart-label">ω  ang vel (rad/s)</div><canvas class="mini" id="c-omega"></canvas></div>
  <div class="chart-cell"><div class="chart-label">x  position (m)</div><canvas class="mini" id="c-x"></canvas></div>
  <div class="chart-cell"><div class="chart-label">a  control</div><canvas class="mini" id="c-a"></canvas></div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let state = {theta:0, omega:0, x:0, v:0, a:0, t:0};
let ws = null;
const N = 300;   // history length
const hist = { theta:[], omega:[], x:[], a:[] };
const phase_hist = [];

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket('ws://localhost:8765');
  ws.onopen  = () => { document.getElementById('dot').classList.add('ok');
                       document.getElementById('conn-label').textContent = 'Connected'; };
  ws.onclose = () => { document.getElementById('dot').classList.remove('ok');
                       document.getElementById('conn-label').textContent = 'Reconnecting…';
                       setTimeout(connect, 1500); };
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    state = d;
    hist.theta.push(d.theta); if(hist.theta.length>N) hist.theta.shift();
    hist.omega.push(d.omega); if(hist.omega.length>N) hist.omega.shift();
    hist.x.push(d.x);         if(hist.x.length>N)     hist.x.shift();
    hist.a.push(d.a);         if(hist.a.length>N)      hist.a.shift();
    phase_hist.push([d.theta,d.omega]); if(phase_hist.length>200) phase_hist.shift();
  };
}
connect();

function sendCtrl(val) {
  if (ws && ws.readyState===1) ws.send(JSON.stringify({a: val}));
}
function setCtrl(v) {
  document.getElementById('ctrl-slider').value = v;
  document.getElementById('ctrl-display').textContent = v.toFixed(2);
  sendCtrl(v);
}
document.getElementById('ctrl-slider').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('ctrl-display').textContent = v.toFixed(2);
  sendCtrl(v);
});
function sendReset(fall=false) {
  if (ws && ws.readyState===1)
    ws.send(JSON.stringify({reset: fall ? [0.8,0,0,0] : [0.05,0,0,0]}));
  setCtrl(0);
}

// ── Main canvas sim ───────────────────────────────────────────────────────────
const simCanvas = document.getElementById('sim');
const ctx = simCanvas.getContext('2d');

function resizeCanvas() {
  simCanvas.width  = simCanvas.clientWidth  * devicePixelRatio;
  simCanvas.height = simCanvas.clientHeight * devicePixelRatio;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const ROD_L = 0.1;   // meters
const SCALE = 380;   // px per meter

function drawSim() {
  const W = simCanvas.width, H = simCanvas.height;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = '#ffffff06';
  ctx.lineWidth = 1;
  const gs = 40 * devicePixelRatio;
  for(let xi=0; xi<W; xi+=gs) { ctx.beginPath(); ctx.moveTo(xi,0); ctx.lineTo(xi,H); ctx.stroke(); }
  for(let yi=0; yi<H; yi+=gs) { ctx.beginPath(); ctx.moveTo(0,yi); ctx.lineTo(W,yi); ctx.stroke(); }

  const cx = W/2, cy = H*0.55;
  const sc = SCALE * devicePixelRatio;
  const cartX = cx + state.x * sc;

  // Rail
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 3*devicePixelRatio;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx-W*0.4, cy+18*devicePixelRatio); ctx.lineTo(cx+W*0.4, cy+18*devicePixelRatio); ctx.stroke();

  // Rail end markers
  for(const sign of [-1,1]) {
    const ex = cx + sign*W*0.4;
    ctx.strokeStyle = '#ff406040';
    ctx.lineWidth = 2*devicePixelRatio;
    ctx.beginPath(); ctx.moveTo(ex, cy); ctx.lineTo(ex, cy+30*devicePixelRatio); ctx.stroke();
  }

  // Cart shadow / glow
  const cartW = 50*devicePixelRatio, cartH = 28*devicePixelRatio;
  const grd = ctx.createRadialGradient(cartX, cy+cartH/2, 4, cartX, cy+cartH/2, 60*devicePixelRatio);
  grd.addColorStop(0,'#1a6a9a30'); grd.addColorStop(1,'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(cartX-50*devicePixelRatio, cy-10*devicePixelRatio, 100*devicePixelRatio, 60*devicePixelRatio);

  // Cart body
  ctx.fillStyle = '#1a2a3a';
  ctx.strokeStyle = '#4af0c860';
  ctx.lineWidth = 1.5*devicePixelRatio;
  roundRect(ctx, cartX-cartW/2, cy-cartH/2, cartW, cartH, 4*devicePixelRatio);
  ctx.fill(); ctx.stroke();

  // Wheels
  for(const wx of [-cartW*0.3, cartW*0.3]) {
    ctx.fillStyle = '#2a3a4a';
    ctx.strokeStyle = '#4af0c840';
    ctx.lineWidth = 1*devicePixelRatio;
    ctx.beginPath(); ctx.arc(cartX+wx, cy+cartH/2+4*devicePixelRatio, 5*devicePixelRatio, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  }

  // Pendulum rod
  const theta = state.theta;
  const pivotY = cy - cartH/2;
  const bobX = cartX + Math.sin(theta) * ROD_L * sc;
  const bobY = pivotY - Math.cos(theta) * ROD_L * sc;

  // Rod glow
  ctx.shadowBlur = 12*devicePixelRatio;
  ctx.shadowColor = '#4af0c880';
  ctx.strokeStyle = '#4af0c8';
  ctx.lineWidth = 2.5*devicePixelRatio;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cartX, pivotY); ctx.lineTo(bobX, bobY); ctx.stroke();
  ctx.shadowBlur = 0;

  // Bob
  ctx.shadowBlur = 16*devicePixelRatio;
  ctx.shadowColor = '#ff4060';
  const bobR = 8*devicePixelRatio;
  ctx.fillStyle = '#ff4060';
  ctx.beginPath(); ctx.arc(bobX, bobY, bobR, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Bob highlight
  ctx.fillStyle = '#ff8090';
  ctx.beginPath(); ctx.arc(bobX-2*devicePixelRatio, bobY-2*devicePixelRatio, 3*devicePixelRatio, 0, Math.PI*2); ctx.fill();

  // Angle arc
  if(Math.abs(theta)>0.01) {
    ctx.strokeStyle = '#4af0c840';
    ctx.lineWidth = 1*devicePixelRatio;
    ctx.setLineDash([3*devicePixelRatio, 4*devicePixelRatio]);
    ctx.beginPath(); ctx.arc(cartX, pivotY, 30*devicePixelRatio, -Math.PI/2, -Math.PI/2+theta);
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Control arrow on cart
  if(Math.abs(state.a) > 0.1) {
    const arrowLen = Math.min(Math.abs(state.a)*2, 60) * devicePixelRatio * Math.sign(state.a);
    ctx.strokeStyle = '#f0a020cc';
    ctx.lineWidth = 2*devicePixelRatio;
    ctx.fillStyle = '#f0a020cc';
    ctx.shadowBlur = 8*devicePixelRatio; ctx.shadowColor = '#f0a020';
    drawArrow(ctx, cartX, cy+4*devicePixelRatio, cartX+arrowLen, cy+4*devicePixelRatio, 6*devicePixelRatio);
    ctx.shadowBlur = 0;
  }

  // Labels
  ctx.fillStyle = '#8ab4c8';
  ctx.font = `${10*devicePixelRatio}px "Share Tech Mono"`;
  ctx.fillText(`θ = ${theta.toFixed(3)} rad`, cx - W*0.38, cy - 30*devicePixelRatio);
  ctx.fillText(`x = ${state.x.toFixed(3)} m`,  cx - W*0.38, cy - 16*devicePixelRatio);
}

function drawArrow(ctx, x1,y1,x2,y2, hw) {
  const angle = Math.atan2(y2-y1, x2-x1);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2-hw*Math.cos(angle-Math.PI/6), y2-hw*Math.sin(angle-Math.PI/6));
  ctx.lineTo(x2-hw*Math.cos(angle+Math.PI/6), y2-hw*Math.sin(angle+Math.PI/6));
  ctx.closePath(); ctx.fill();
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── Mini charts ───────────────────────────────────────────────────────────────
const miniCanvases = {
  theta: document.getElementById('c-theta'),
  omega: document.getElementById('c-omega'),
  x:     document.getElementById('c-x'),
  a:     document.getElementById('c-a'),
};
const colors = { theta:'#4af0c8', omega:'#4af0c8', x:'#f0a020', a:'#ff4060' };

function resizeMini() {
  for(const [k,c] of Object.entries(miniCanvases)) {
    c.width  = c.clientWidth  * devicePixelRatio;
    c.height = c.clientHeight * devicePixelRatio;
  }
}
resizeMini();
window.addEventListener('resize', resizeMini);

function drawMini(canv, data, color) {
  if(!data.length) return;
  const W=canv.width, H=canv.height, c=canv.getContext('2d');
  c.clearRect(0,0,W,H);
  const mn=Math.min(...data), mx=Math.max(...data);
  const range=mx-mn || 1e-6;
  const pad=8*devicePixelRatio;

  // zero line
  const zy = H - pad - ((0-mn)/range)*(H-2*pad);
  c.strokeStyle='#ffffff15'; c.lineWidth=1;
  c.beginPath(); c.moveTo(0,zy); c.lineTo(W,zy); c.stroke();

  // fill
  const grad = c.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, color+'50'); grad.addColorStop(1, color+'00');
  c.fillStyle = grad;
  c.beginPath();
  data.forEach((v,i)=>{
    const px=i/(N-1)*W, py=H-pad-(v-mn)/range*(H-2*pad);
    i===0 ? c.moveTo(px,py) : c.lineTo(px,py);
  });
  c.lineTo(W,H); c.lineTo(0,H); c.closePath(); c.fill();

  // line
  c.strokeStyle=color; c.lineWidth=1.5*devicePixelRatio; c.lineJoin='round';
  c.beginPath();
  data.forEach((v,i)=>{
    const px=i/(N-1)*W, py=H-pad-(v-mn)/range*(H-2*pad);
    i===0 ? c.moveTo(px,py) : c.lineTo(px,py);
  });
  c.stroke();

  // latest value
  const last=data[data.length-1];
  c.fillStyle=color; c.font=`${9*devicePixelRatio}px "Share Tech Mono"`;
  c.fillText(last.toFixed(3), W-50*devicePixelRatio, 14*devicePixelRatio);
}

// ── Phase portrait ────────────────────────────────────────────────────────────
function drawPhase() {
  const c = document.getElementById('phase');
  const W=c.width=c.clientWidth*devicePixelRatio, H=c.height=c.clientHeight*devicePixelRatio;
  const ct=c.getContext('2d');
  ct.clearRect(0,0,W,H);

  // axes
  ct.strokeStyle='#2a3a4a'; ct.lineWidth=1;
  ct.beginPath(); ct.moveTo(W/2,0); ct.lineTo(W/2,H); ct.stroke();
  ct.beginPath(); ct.moveTo(0,H/2); ct.lineTo(W,H/2); ct.stroke();

  if(phase_hist.length<2) return;
  const sc = Math.min(W,H)*0.42;
  const max_om = 5;

  for(let i=1;i<phase_hist.length;i++){
    const [t0,o0]=phase_hist[i-1], [t1,o1]=phase_hist[i];
    const alpha=i/phase_hist.length;
    ct.strokeStyle=`rgba(74,240,200,${alpha*0.8})`;
    ct.lineWidth=1.5*devicePixelRatio;
    ct.beginPath();
    ct.moveTo(W/2+t0/Math.PI*sc, H/2-o0/max_om*sc*0.5);
    ct.lineTo(W/2+t1/Math.PI*sc, H/2-o1/max_om*sc*0.5);
    ct.stroke();
  }
  // current dot
  const [th,om]=phase_hist[phase_hist.length-1];
  ct.fillStyle='#4af0c8'; ct.shadowBlur=8; ct.shadowColor='#4af0c8';
  ct.beginPath(); ct.arc(W/2+th/Math.PI*sc, H/2-om/max_om*sc*0.5, 3*devicePixelRatio, 0, Math.PI*2); ct.fill();
  ct.shadowBlur=0;
}

// ── UI updates ────────────────────────────────────────────────────────────────
function updateUI() {
  const s = state;
  document.getElementById('h-theta').textContent = s.theta.toFixed(3);
  document.getElementById('h-x').textContent     = s.x.toFixed(3);
  document.getElementById('h-t').textContent     = s.t.toFixed(2);
  document.getElementById('s-theta').textContent = s.theta.toFixed(4);
  document.getElementById('s-omega').textContent = s.omega.toFixed(4);
  document.getElementById('s-x').textContent     = s.x.toFixed(4);
  document.getElementById('s-v').textContent     = s.v.toFixed(4);

  function barW(v, range) { return Math.min(100, Math.max(0, (v/range+1)*50))+'%'; }
  function barColor(v, thresh) { return Math.abs(v)>thresh ? 'var(--red)' : 'var(--rod)'; }

  document.getElementById('b-theta').style.width      = barW(s.theta,Math.PI);
  document.getElementById('b-theta').style.background = barColor(s.theta,0.5);
  document.getElementById('b-omega').style.width      = barW(s.omega,10);
  document.getElementById('b-omega').style.background = barColor(s.omega,5);
  document.getElementById('b-x').style.width          = barW(s.x,2);
  document.getElementById('b-x').style.background     = barColor(s.x,1);
  document.getElementById('b-v').style.width          = barW(s.v,5);
  document.getElementById('b-v').style.background     = barColor(s.v,3);
}

// ── Render loop ───────────────────────────────────────────────────────────────
function frame() {
  drawSim();
  drawMini(miniCanvases.theta, hist.theta, colors.theta);
  drawMini(miniCanvases.omega, hist.omega, colors.omega);
  drawMini(miniCanvases.x,     hist.x,     colors.x);
  drawMini(miniCanvases.a,     hist.a,     colors.a);
  drawPhase();
  updateUI();
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
